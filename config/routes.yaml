---
# yaml-language-server: $schema=../vendor/symfony/routing/Loader/schema/routing.schema.json

# This file is the entry point to configure the routes of your app.
# Methods with the #[Route] attribute are automatically imported.
# See also https://symfony.com/doc/current/routing.html

# To list all registered routes, run the following command:
#   bin/console debug:router

controllers:
  resource: routing.controllers

legacy_index:
  path: /index.html
  controller: &redirect Symfony\Bundle\FrameworkBundle\Controller\RedirectController
  defaults:
     route: rt_main

legacy_new:
  path: /new.html
  controller: *redirect
  defaults:
     route: rt_new_creators

legacy_events:
  path: /events.html
  controller: *redirect
  defaults:
     route: rt_events

legacy_info:
  path: /info.html
  controller: *redirect
  defaults:
     route: rt_info

legacy_tracking:
  path: /tracking.html
  controller: *redirect
  defaults:
     route: rt_tracking

legacy_maker_ids:
  path: /maker_ids.html
  controller: *redirect
  defaults:
     route: rt_creator_ids

legacy_donate:
  path: /donate.html
  controller: *redirect
  defaults:
     route: rt_donate

legacy_guidelines_1:
  path: /rules.html
  controller: *redirect
  defaults:
     route: rt_guidelines

legacy_guidelines_2:
  path: /rules
  controller: *redirect
  defaults:
     route: rt_guidelines

legacy_should_know:
  path: /should_know.html
  controller: *redirect
  defaults:
     route: rt_should_know

legacy_statistics:
  path: /statistics.html
  controller: *redirect
  defaults:
     route: rt_statistics
